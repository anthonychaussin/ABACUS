name: publish-nuget

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore ABACUS.slnx

      - name: Build
        run: dotnet build ABACUS.slnx -c Release --no-restore

      - name: Test
        run: dotnet test ABACUS.slnx -c Release --no-build --verbosity normal

      - name: Compute package version
        run: |
          VERSION="0.0.0-sha.${GITHUB_SHA::8}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PACK_DIR=./artifacts/${{ github.run_id }}.${{ github.run_attempt }}" >> "$GITHUB_ENV"
          echo "Using package version: $VERSION"

      - name: Pack
        run: |
          rm -rf "${{ env.PACK_DIR }}"
          mkdir -p "${{ env.PACK_DIR }}"
          dotnet pack ABACUS.slnx -c Release --no-build -o "${{ env.PACK_DIR }}" /p:PackageVersion=${{ env.PACKAGE_VERSION }}
          ls -la "${{ env.PACK_DIR }}"

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push "${{ env.PACK_DIR }}/*.nupkg" --skip-duplicate -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json
            dotnet nuget push "${{ env.PACK_DIR }}/*.snupkg" --skip-duplicate -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json
          fi
