name: publish-nuget

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ABACUS.slnx

      - name: Build
        run: dotnet build ABACUS.slnx -c Release --no-restore

      - name: Test
        run: dotnet test ABACUS.slnx -c Release --no-build --verbosity normal

      - name: Compute package version
        run: |
          VERSION="0.0.${{ github.run_number }}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Using package version: $VERSION"

      - name: Pack
        run: |
          dotnet pack ABACUS.slnx -c Release --no-build -o ./artifacts /p:Version=${{ env.PACKAGE_VERSION }}

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
