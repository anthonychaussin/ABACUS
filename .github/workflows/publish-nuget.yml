name: publish-nuget

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore ABACUS.slnx

      - name: Build
        run: dotnet build ABACUS.slnx -c Release --no-restore

      - name: Test
        run: dotnet test ABACUS.slnx -c Release --no-build --verbosity normal

      - name: Compute package version
        run: |
          BASE_VERSION="$(grep -oPm1 '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)"
          LAST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"

          if [ -n "$LAST_TAG" ]; then
            VERSION="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            VERSION="$BASE_VERSION"
          fi

          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PACK_DIR=./artifacts/${{ github.run_id }}.${{ github.run_attempt }}" >> "$GITHUB_ENV"
          echo "Using package version: $VERSION"

      - name: Pack
        run: |
          rm -rf "${{ env.PACK_DIR }}"
          mkdir -p "${{ env.PACK_DIR }}"
          dotnet pack ABACUS.slnx -c Release --no-build -o "${{ env.PACK_DIR }}" /p:PackageVersion=${{ env.PACKAGE_VERSION }}
          ls -la "${{ env.PACK_DIR }}"

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            shopt -s nullglob

            for package in "${{ env.PACK_DIR }}"/*.nupkg; do
              dotnet nuget push "$package" --no-symbols --skip-duplicate -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json
            done

            for symbols_package in "${{ env.PACK_DIR }}"/*.snupkg; do
              attempt=1
              max_attempts=5

              while true; do
                if dotnet nuget push "$symbols_package" --skip-duplicate -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json; then
                  break
                fi

                if [ "$attempt" -ge "$max_attempts" ]; then
                  exit 1
                fi

                sleep_seconds=$((attempt * 15))
                echo "Retrying symbol push for $symbols_package in ${sleep_seconds}s..."
                sleep "$sleep_seconds"
                attempt=$((attempt + 1))
              done
            done
          fi

      - name: Tag release
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            TAG="v${{ env.PACKAGE_VERSION }}"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists"
              exit 0
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
