name: publish-nuget

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ABACUS.slnx

      - name: Build
        run: dotnet build ABACUS.slnx -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack ABACUS.CORE/ABACUS.Core.csproj -c Release --no-build -o ./artifacts
          for proj in ABACUS.*/*.csproj; do
            if [ "$proj" != "ABACUS.CORE/ABACUS.Core.csproj" ]; then
              dotnet pack "$proj" -c Release --no-build -o ./artifacts
            fi
          done
          dotnet pack ABACUS/ABACUS.csproj -c Release --no-build -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
