name: ci

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore ABACUS.slnx

      - name: Build
        run: dotnet build ABACUS.slnx -c Release --no-restore -m:1

      - name: Test
        run: dotnet test ABACUS.slnx -c Release --no-build -m:1 --verbosity normal

      - name: Audit generated clients
        shell: pwsh
        run: ./scripts/Audit-GeneratedClients.ps1
