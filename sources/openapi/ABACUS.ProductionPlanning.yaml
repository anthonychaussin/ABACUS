    get:
      summary: 2.101 - Query unprocessed hours confirmation from the UBI table
      description: >-
        <u><b>English:</b></u>

        The «ProductionImportDatas» entity reads unprocessed PDC import data
        records from the UBI table using the «GET» method. This can be useful if
        you want to check at a later date whether there are still unbooked
        hours.


        <u><b>German:</b></u>

        Die Entität «ProductionImportDatas» liest mit der Methode «GET» nicht
        verarbeitete BDE-Import-Datensätze aus der Tabelle UBI aus. Das kann
        nützlich sein, wenn auch zu einem späteren Zeitpunkt überprüft werden
        soll, ob noch unverbuchte Stunden vorhanden sind.
      operationId: get_ProductionImportDatas
      tags:
        - >-
          2.10 ProductionImportDatas (Importing time confirmations for work
          items)
      responses:
        '200':
          description: Successful
        '400':
          description: Bad Request
        '500':
          description: Server Error
