  /ProductionImportDatas:
    post:
      summary: 2.100 - Read in hourly confirmation for a work position
      description: "<u><b>English:</b></u>\nProduction order times can be imported from a 3rd system (PDA system) via the Abacus PDA import interface. This means that order times that have been recorded in a 3rd system are posted as hourly confirmations in production orders.\n\nThe «ProductionImportDatas» entity uses the «POST» method to read corresponding data records via the UBI table and ideally posts them directly to the UPJ table. \nIf a production order cannot accept any confirmations, the data record remains in the intermediate table UBI and can be posted in Abacus PPS at a later time. This means that in such a situation there is also no feedback or error message to the 3rd system.\n\nTo check which bookings could not yet be posted as confirmations in the production order, the «ProductionImportDatas» entity outputs all these data records using the «GET» method. See case 2.101.\n\nChanges (PATCH) to a data record that has already been transferred are not permitted. Corrections must be transferred with an additional confirmation as a difference posting.\n\n<b>Important note:</b> To avoid multiple confirmations of the same order time, we recommend assigning a unique number to each booking record. Our «ProductionDataReference» element is available for this purpose.\n\nPDC = Production data collection\n\n<u><b>German:</b></u>\nÜber die Abacus BDE-Import-Schnittstelle lassen sich Produktionsauftragszeiten aus einem 3. System (BDE-System) einlesen. Das heisst, Auftragszeiten, welche in einem 3. System erfasst wurden, werden damit als Stundenrückmeldungen in Produktionsaufträge verbucht.\n\nDie Entität «ProductionImportDatas» liest mit der Methode «POST» entsprchende Datensätze über die Tabelle UBI ein und verbucht diese im Idealfall direkt in die Tabelle UPJ. \nSollte ein Produktionsauftrag keine Rückmeldungen annehmen können, bleibt der Datensatz in der Zwischentabelle UBI stehen und kann im Abacus PPS zu einem späteren Zeitpunkt verbucht werden. Das heisst, in einer solchen Situation gibt es auch keine Rück- respetive Fehlermeldung ans 3. System zurück.\n\nUm zu kontrollieren, welche Buchungen noch nicht als Rückmeldung im Produktionsauftrag verbucht werden konnten, gibt die Entität «ProductionImportDatas» mit der Methode «GET» all diese Datensätze aus. Siehe Fall 2.101.\n\nÄnderungen (PATCH) eines bereits übergebenen Datensatzes werden nicht zugelassen. Korrekturen müssen mit einer zusätzlichen Rückmeldung als Differenzbuchung übergeben werden.\n\n<b>Wichtiger Hinweis:</b> Um mehrfache Rückmeldungen derselben Auftragszeit zu vermeiden, empfehlen wir, jedem Buchungsatz eine eindeutige Nummer mitzugeben. Dafür steht unser Element «ProductionDataReference» zur Verfügung.\n\nBDE = Betriebsdatenerfassung\n\n<html xmlns:v=\"urn:schemas-microsoft-com:vml\"\nxmlns:o=\"urn:schemas-microsoft-com:office:office\"\nxmlns:w=\"urn:schemas-microsoft-com:office:word\"\nxmlns:m=\"http://schemas.microsoft.com/office/2004/12/omml\"\nxmlns=\"http://www.w3.org/TR/REC-html40\">\n\n<head>\n<meta http-equiv=Content-Type content=\"text/html; charset=windows-1252\">\n<meta name=ProgId content=Word.Document>\n<meta name=Generator content=\"Microsoft Word 15\">\n<meta name=Originator content=\"Microsoft Word 15\">\n<link rel=File-List href=\"Feldbezeichnung_BDE_Import-Dateien/filelist.xml\">\n<!--[if gte mso 9]><xml>\n <o:DocumentProperties>\n  <o:Author>Joachim Dörrer</o:Author>\n  <o:LastAuthor>Joachim Dörrer</o:LastAuthor>\n  <o:Revision>2</o:Revision>\n  <o:LastPrinted>2020-09-08T05:48:00Z</o:LastPrinted>\n  <o:Created>2024-06-14T09:56:00Z</o:Created>\n  <o:LastSaved>2024-06-14T09:56:00Z</o:LastSaved>\n  <o:Pages>1</o:Pages>\n  <o:Words>452</o:Words>\n  <o:Characters>2851</o:Characters>\n  <o:Lines>23</o:Lines>\n  <o:Paragraphs>6</o:Paragraphs>\n  <o:CharactersWithSpaces>3297</o:CharactersWithSpaces>\n  <o:Version>16.00</o:Version>\n </o:DocumentProperties>\n <o:OfficeDocumentSettings>\n  <o:AllowPNG/>\n </o:OfficeDocumentSettings>\n</xml><![endif]